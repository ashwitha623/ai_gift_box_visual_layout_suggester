services:
  # Backend Express Service
  - type: web
    name: paperplane-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_VERSION
        value: 20

  # Frontend Vite Static Site
  - type: web
    name: paperplane-frontend
    runtime: static
    buildCommand: npm run build
    staticPublishPath: dist
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: VITE_API_URL
        fromService:
          name: paperplane-backend
          type: web
          property: host
