services:
  # Backend Express Service
  - type: web
    name: paperplane-backend
    env: node
    rootDir: backend
    buildCommand: npm install && npm rebuild sqlite3 --build-from-source
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_VERSION
        value: 20

  # Frontend Vite Static Site
  - type: web
    name: paperplane-frontend
    runtime: static
    buildCommand: npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: VITE_API_URL
        value: https://paperplane-backend-hl87.onrender.com
